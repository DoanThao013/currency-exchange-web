<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Chuyển đổi Tiền tệ</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- File CSS riêng -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- Header & Background Curve -->
    <div class="bg-brand-dark relative pt-20 pb-40">
        <div class="container mx-auto px-4 text-center relative z-10">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">Công cụ Chuyển đổi Tiền tệ và Tỷ giá</h1>
        </div>
        
        <svg class="absolute -bottom-1 w-full h-[60px] md:h-[120px] text-[#f8f9fa]" preserveAspectRatio="none" viewBox="0 0 1440 100" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,100 C480,0 960,0 1440,100 Z" />
        </svg>
    </div>

    <!-- Main Card Container -->
    <div class="container mx-auto px-4 relative z-20 -mt-24 md:-mt-28 mb-20">
        <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] p-6 md:p-8">
            
            <!-- Inputs Row -->
            <div class="flex flex-col md:flex-row items-center gap-4 md:gap-6 relative">
                
                <!-- "From" Input Box -->
                <div class="w-full border border-gray-200 rounded-xl p-3 md:p-4 hover:border-gray-300 focus-within:border-brand-blue focus-within:ring-1 focus-within:ring-brand-blue transition-all bg-white relative">
                    <label class="block text-sm text-gray-500 font-medium mb-1">Từ</label>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center w-1/2">
                            <span id="symbolFrom" class="text-xl font-semibold text-gray-800 mr-1">$</span>
                            <input id="inputFrom" type="number" value="1" class="text-xl md:text-2xl font-bold text-gray-800 w-full outline-none bg-transparent" placeholder="0.00">
                        </div>
                        <div class="flex items-center gap-2 px-2 py-1 rounded-lg hover:bg-gray-50 transition-colors border border-transparent hover:border-gray-200 relative">
                            <img id="flagFrom" src="https://flagcdn.com/w40/us.png" alt="Flag" class="w-6 h-6 rounded-full object-cover border border-gray-100 shadow-sm z-10 pointer-events-none">
                            <select id="currencyFrom" class="font-semibold text-gray-700 text-sm md:text-base outline-none bg-transparent appearance-none cursor-pointer pr-4 z-20">
                                <option value="USD" selected>USD - Đô la Mỹ</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="VND">VND - Đồng Việt Nam</option>
                                <option value="AUD">AUD - Đô la Úc</option>
                            </select>
                            <svg class="w-4 h-4 text-gray-500 absolute right-2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>

                <!-- Swap Button (Desktop) -->
                <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-30 hidden md:flex items-center justify-center">
                    <button id="btnSwap" class="w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 text-gray-600 shadow-sm transition-transform hover:scale-105 focus:outline-none">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                        </svg>
                    </button>
                </div>

                <!-- Swap Button (Mobile) -->
                <button id="btnSwapMobile" class="md:hidden w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 text-gray-600 shadow-sm z-30 -my-6 relative focus:outline-none">
                    <svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                    </svg>
                </button>

                <!-- "To" Input Box -->
                <div class="w-full border border-gray-200 rounded-xl p-3 md:p-4 hover:border-gray-300 focus-within:border-brand-blue focus-within:ring-1 focus-within:ring-brand-blue transition-all bg-white relative">
                    <label class="block text-sm text-gray-500 font-medium mb-1">Đến</label>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center w-1/2">
                            <span id="symbolTo" class="text-xl font-semibold text-gray-800 mr-1">₫</span>
                            <input id="inputTo" type="text" readonly class="text-xl md:text-2xl font-bold text-gray-800 w-full outline-none bg-transparent" placeholder="0.00">
                        </div>
                        <div class="flex items-center gap-2 px-2 py-1 rounded-lg hover:bg-gray-50 transition-colors border border-transparent hover:border-gray-200 relative">
                            <img id="flagTo" src="https://flagcdn.com/w40/vn.png" alt="Flag" class="w-6 h-6 rounded-full object-cover border border-gray-100 shadow-sm z-10 pointer-events-none">
                            <select id="currencyTo" class="font-semibold text-gray-700 text-sm md:text-base outline-none bg-transparent appearance-none cursor-pointer pr-4 z-20">
                                <option value="USD">USD - Đô la Mỹ</option>
                                <option value="EUR">EUR - Euro</option>
                                <option value="VND" selected>VND - Đồng Việt Nam</option>
                                <option value="AUD">AUD - Đô la Úc</option>
                            </select>
                            <svg class="w-4 h-4 text-gray-500 absolute right-2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Footer Section -->
            <div class="mt-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                <!-- Rate Info -->
                <div>
                    <h3 id="rateInfo" class="text-xl md:text-2xl font-bold text-brand-dark mb-1">
                        <!-- Sẽ được cập nhật bằng JS -->
                    </h3>
                    
                </div>
                                
            </div>

        </div>
    </div>

    <!-- File JavaScript riêng -->
    <script src="main.js"></script>
</body>
</html>
