<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Chuyển đổi Tiền tệ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="antialiased min-h-screen flex flex-col">

    <!-- Animated background orbs -->
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <div class="bg-brand-dark relative pt-16 pb-12">
        <div class="container mx-auto px-4 text-center relative z-10">
            <h1 class="text-3xl md:text-5xl font-bold text-white mb-3">Công cụ Chuyển đổi Tiền tệ và Tỷ giá</h1>
        </div>
    </div>

    <!-- Main Card Container -->
    <div class="container mx-auto px-4 relative z-20 mt-8 mb-20">
        <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] p-6 md:p-8">

            <!-- Inputs Row -->
            <div class="flex flex-col md:flex-row items-center gap-4 md:gap-6 relative">

                <!-- "From" Input Box -->
                <div
                    class="w-full border border-gray-200 rounded-xl p-3 md:p-4 hover:border-gray-300 focus-within:border-brand-blue focus-within:ring-1 focus-within:ring-brand-blue transition-all bg-white relative">
                    <label class="block text-sm text-gray-500 font-medium mb-1">Từ</label>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center w-1/2">
                            <span id="symbolFrom" class="text-xl font-semibold text-gray-800 mr-1">$</span>
                            <input id="inputFrom" type="number" value="1"
                                class="text-xl md:text-2xl font-bold text-gray-800 w-full outline-none bg-transparent"
                                placeholder="0.00">
                        </div>
                        <!-- Custom dropdown: From -->
                        <div id="dropdownWrapFrom" class="currency-dropdown relative">
                            <button id="triggerFrom" type="button"
                                class="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-gray-50 transition-colors border border-transparent hover:border-gray-200 cursor-pointer focus:outline-none">
                                <img id="flagFrom" src="https://flagcdn.com/w40/us.png" alt="Flag"
                                    class="w-6 h-6 rounded-full object-cover shadow-sm">
                                <span id="labelFrom"
                                    class="font-semibold text-gray-700 text-sm md:text-base whitespace-nowrap">USD - Đô
                                    la Mỹ</span>
                                <svg class="w-4 h-4 text-gray-400 transition-transform duration-200" id="chevronFrom"
                                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 9l-7 7-7-7" />
                                </svg>
                            </button>
                            <ul id="menuFrom"
                                class="dropdown-menu hidden absolute right-0 top-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg z-50 min-w-[210px] py-1 overflow-hidden">
                                <li class="dropdown-option px-3 py-2 flex items-center gap-2.5 hover:bg-blue-50 cursor-pointer"
                                    data-value="USD" data-flag="us" data-label="USD - Đô la Mỹ">
                                    <img src="https://flagcdn.com/w40/us.png" class="w-5 h-5 rounded-full object-cover">
                                    <span class="text-sm font-medium text-gray-700">USD - Đô la Mỹ</span>
                                </li>
                                <li class="dropdown-option px-3 py-2 flex items-center gap-2.5 hover:bg-blue-50 cursor-pointer"
                                    data-value="EUR" data-flag="eu" data-label="EUR - Euro">
                                    <img src="https://flagcdn.com/w40/eu.png" class="w-5 h-5 rounded-full object-cover">
                                    <span class="text-sm font-medium text-gray-700">EUR - Euro</span>
                                </li>
                                <li class="dropdown-option px-3 py-2 flex items-center gap-2.5 hover:bg-blue-50 cursor-pointer"
                                    data-value="VND" data-flag="vn" data-label="VND - Đồng Việt Nam">
                                    <img src="https://flagcdn.com/w40/vn.png" class="w-5 h-5 rounded-full object-cover">
                                    <span class="text-sm font-medium text-gray-700">VND - Đồng Việt Nam</span>
                                </li>
                                <li class="dropdown-option px-3 py-2 flex items-center gap-2.5 hover:bg-blue-50 cursor-pointer"
                                    data-value="AUD" data-flag="au" data-label="AUD - Đô la Úc">
                                    <img src="https://flagcdn.com/w40/au.png" class="w-5 h-5 rounded-full object-cover">
                                    <span class="text-sm font-medium text-gray-700">AUD - Đô la Úc</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Swap Button (Desktop) -->
                <div
                    class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-30 hidden md:flex items-center justify-center">
                    <button id="btnSwap"
                        class="w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 text-gray-600 shadow-sm transition-transform hover:scale-105 focus:outline-none">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                        </svg>
                    </button>
                </div>

                <!-- Swap Button (Mobile) -->
                <button id="btnSwapMobile"
                    class="md:hidden w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-50 text-gray-600 shadow-sm z-30 -my-6 relative focus:outline-none">
                    <svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                    </svg>
                </button>

                <!-- "To" Input Box -->
                <div
                    class="w-full border border-gray-200 rounded-xl p-3 md:p-4 hover:border-gray-300 focus-within:border-brand-blue focus-within:ring-1 focus-within:ring-brand-blue transition-all bg-white relative">
                    <label class="block text-sm text-gray-500 font-medium mb-1">Đến</label>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center w-1/2">
                            <span id="symbolTo" class="text-xl font-semibold text-gray-800 mr-1">₫</span>
                            <input id="inputTo" type="text" readonly
                                class="text-xl md:text-2xl font-bold text-gray-800 w-full outline-none bg-transparent"
                                placeholder="0.00">
                        </div>
                        <!-- Custom dropdown: To -->
                        <div id="dropdownWrapTo" class="currency-dropdown relative">
                            <button id="triggerTo" type="button"
                                class="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-gray-50 transition-colors border border-transparent hover:border-gray-200 cursor-pointer focus:outline-none">
                                <img id="flagTo" src="https://flagcdn.com/w40/vn.png" alt="Flag"
                                    class="w-6 h-6 rounded-full object-cover shadow-sm">
                                <span id="labelTo"
                                    class="font-semibold text-gray-700 text-sm md:text-base whitespace-nowrap">VND -
                                    Đồng Việt Nam</span>
                                <svg class="w-4 h-4 text-gray-400 transition-transform duration-200" id="chevronTo"
                                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 9l-7 7-7-7" />
                                </svg>
                            </button>
                            <ul id="menuTo"
                                class="dropdown-menu hidden absolute right-0 top-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg z-50 min-w-[210px] py-1 overflow-hidden">
                                <li class="dropdown-option px-3 py-2 flex items-center gap-2.5 hover:bg-blue-50 cursor-pointer"
                                    data-value="USD" data-flag="us" data-label="USD - Đô la Mỹ">
                                    <img src="https://flagcdn.com/w40/us.png" class="w-5 h-5 rounded-full object-cover">
                                    <span class="text-sm font-medium text-gray-700">USD - Đô la Mỹ</span>
                                </li>
                                <li class="dropdown-option px-3 py-2 flex items-center gap-2.5 hover:bg-blue-50 cursor-pointer"
                                    data-value="EUR" data-flag="eu" data-label="EUR - Euro">
                                    <img src="https://flagcdn.com/w40/eu.png" class="w-5 h-5 rounded-full object-cover">
                                    <span class="text-sm font-medium text-gray-700">EUR - Euro</span>
                                </li>
                                <li class="dropdown-option px-3 py-2 flex items-center gap-2.5 hover:bg-blue-50 cursor-pointer"
                                    data-value="VND" data-flag="vn" data-label="VND - Đồng Việt Nam">
                                    <img src="https://flagcdn.com/w40/vn.png" class="w-5 h-5 rounded-full object-cover">
                                    <span class="text-sm font-medium text-gray-700">VND - Đồng Việt Nam</span>
                                </li>
                                <li class="dropdown-option px-3 py-2 flex items-center gap-2.5 hover:bg-blue-50 cursor-pointer"
                                    data-value="AUD" data-flag="au" data-label="AUD - Đô la Úc">
                                    <img src="https://flagcdn.com/w40/au.png" class="w-5 h-5 rounded-full object-cover">
                                    <span class="text-sm font-medium text-gray-700">AUD - Đô la Úc</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Footer Section -->
            <div class="mt-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                <!-- Rate Info -->
                <div>
                    <h3 id="rateInfo" class="text-xl md:text-2xl font-bold text-brand-dark mb-1">
                        <!-- Sẽ được cập nhật bằng JS -->
                    </h3>

                </div>

            </div>

        </div>
    </div>

    <!-- File JavaScript riêng -->
    <script src="main.js"></script>
</body>

</html>
